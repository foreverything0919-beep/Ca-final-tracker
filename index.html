<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>CA Final · Nov 2026 Dials</title>
<style>
  :root{--bg:#0F1115;--panel:#181B22;--panel-2:#1F232C;--line:#2A2F3A;--text:#EDEFF3;--text-dim:#8B92A3;--fr:#4FD1A5;--afm:#FF9F6B;--audit:#7FB1FF;--track:#262B35;--shadow:0 8px 24px rgba(0,0,0,0.35)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,'SF Pro Display','Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:50px}
  .header{padding:24px 18px 8px}
  .header .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin:0 0 4px;font-weight:600}
  .header h1{font-size:26px;margin:0;font-weight:800;letter-spacing:-.01em}
  .hero{display:flex;align-items:center;justify-content:center;padding:22px 18px 6px}
  .hero-ring-wrap{position:relative;width:200px;height:200px}
  .hero-ring-wrap svg{transform:rotate(-90deg);width:100%;height:100%}
  .hero-ring-track{fill:none;stroke:var(--track);stroke-width:14}
  .hero-ring-fill{fill:none;stroke-width:14;stroke-linecap:round;transition:stroke-dasharray .6s ease}
  .hero-center{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .hero-pct{font-size:42px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
  .hero-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-top:4px;font-weight:600}
  .hero-count{font-size:12px;color:var(--text-dim);margin-top:2px}
  .countdown-strip{text-align:center;font-size:12px;color:var(--text-dim);padding:4px 0 18px}
  .countdown-strip b{color:var(--text);font-weight:700}
  .ring-row{display:flex;justify-content:space-around;gap:10px;padding:0 16px 22px}
  .ring-card{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 8px 12px;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .15s ease,border-color .15s ease}
  .ring-card:active{transform:scale(.97)}
  .ring-card.active{border-color:var(--ring-color)}
  .mini-ring-wrap{position:relative;width:64px;height:64px;margin-bottom:8px}
  .mini-ring-wrap svg{transform:rotate(-90deg);width:100%;height:100%}
  .mini-ring-track{fill:none;stroke:var(--track);stroke-width:7}
  .mini-ring-fill{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dasharray .5s ease}
  .mini-center{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;font-variant-numeric:tabular-nums}
  .ring-card-tag{font-size:12px;font-weight:700;letter-spacing:.06em}
  .ring-card-sub{font-size:10px;color:var(--text-dim);margin-top:2px}
  .panel{display:none;padding:0 16px 16px}
  .panel.visible{display:block}
  .panel-head{display:flex;align-items:center;gap:12px;padding:4px 4px 16px}
  .panel-ring-wrap{position:relative;width:56px;height:56px;flex-shrink:0}
  .panel-ring-wrap svg{transform:rotate(-90deg);width:100%;height:100%}
  .panel-ring-track{fill:none;stroke:var(--track);stroke-width:6}
  .panel-ring-fill{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dasharray .5s ease}
  .panel-center{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
  .panel-title{font-size:17px;font-weight:800}
  .panel-meta{font-size:12px;color:var(--text-dim);margin-top:2px}
  .group{margin-bottom:14px}
  .group-head{display:flex;justify-content:space-between;align-items:baseline;padding:6px 4px 8px}
  .group-title{font-size:12px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em}
  .group-frac{font-size:11px;color:var(--text-dim);font-variant-numeric:tabular-nums}
  .topic-row{display:flex;align-items:flex-start;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:background .15s ease,border-color .15s ease}
  .topic-row:active{background:var(--panel-2)}
  .topic-row.checked{border-color:var(--ring-color);background:var(--panel-2)}
  .checkbox{width:22px;height:22px;border:1.5px solid var(--text-dim);border-radius:7px;flex-shrink:0;margin-top:1px;position:relative;transition:all .15s ease}
  .checkbox.checked{background:var(--ring-color);border-color:var(--ring-color)}
  .checkbox.checked::after{content:'';position:absolute;left:6.5px;top:2px;width:6px;height:11px;border:solid #0F1115;border-width:0 2.5px 2.5px 0;transform:rotate(45deg)}
  .topic-text{flex:1;font-size:14px;line-height:1.45}
  .topic-row.checked .topic-text{color:var(--text-dim);text-decoration:line-through;text-decoration-color:var(--line)}
  .topic-marks{font-size:11px;font-weight:700;color:var(--ring-color);background:rgba(255,255,255,0.06);padding:3px 8px;border-radius:8px;flex-shrink:0;white-space:nowrap;margin-top:1px}
  .actions{display:flex;gap:10px;padding:8px 16px 4px}
  .btn{flex:1;font-size:12px;font-weight:700;letter-spacing:.04em;padding:12px 8px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--text);cursor:pointer;text-align:center}
  .btn:active{background:var(--panel-2)}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel-2);border:1px solid var(--line);color:var(--text);font-size:12px;font-weight:600;padding:10px 18px;border-radius:10px;opacity:0;transition:all .3s ease;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="header"><p class="eyebrow">CA Final · Preparation Tracker</p><h1>November 2026</h1></div>
<div class="hero"><div class="hero-ring-wrap"><svg viewBox="0 0 200 200"><circle class="hero-ring-track" cx="100" cy="100" r="86"/><circle class="hero-ring-fill" id="heroRing" cx="100" cy="100" r="86" stroke="#4FD1A5"/></svg><div class="hero-center"><div class="hero-pct" id="heroPct">0%</div><div class="hero-label">Overall</div><div class="hero-count" id="heroCount">0 / 0</div></div></div></div>
<div class="countdown-strip" id="countdown">—</div>
<div class="ring-row" id="ringRow"></div>
<div id="panels"></div>
<div class="actions"><button class="btn" id="exportBtn">Export backup</button><button class="btn" id="resetBtn">Reset all</button></div>
<div class="toast" id="toast"></div>
<script>
const DATA={FR:{name:"Financial Reporting",color:"#4FD1A5",groups:[{title:"Consolidation & Business Combinations (Q1, 14 marks)",topics:[{t:"Basic CFS: subsidiary, NCI (proportionate & fair value)",m:"14"},{t:"Step acquisition (associate → subsidiary)",m:"14"},{t:"Multiple acquisition dates / part-year results",m:"14"},{t:"Mutual holdings, intercompany debentures cancellation",m:"14"},{t:"Unrealised profit on intra-group inventory sales",m:"14"},{t:"Goodwill computation & impairment",m:"14"},{t:"Bargain purchase / capital reserve",m:"14"},{t:"Fair value adjustments on PPE/inventory at acquisition",m:"14"},{t:"Foreign subsidiary translation (Ind AS 21 in CFS)",m:"14"},{t:"Investment in associate (equity method) within CFS",m:"14"}]},{title:"Ind AS 115 – Revenue Recognition",topics:[{t:"Identifying distinct performance obligations",m:"4-8"},{t:"Customer loyalty points / variable consideration",m:"5"},{t:"Contract modification – cumulative catch-up",m:"5"},{t:"Principal vs agent",m:"2-4"},{t:"Bill-and-hold arrangements",m:"5"},{t:"Warranty / after-sales service bundled contracts",m:"2-10"},{t:"Percentage of completion (input method)",m:"2-6"}]},{title:"Ind AS 16 / 36 – PPE, Revaluation & Impairment",topics:[{t:"Revaluation model – gross vs net restatement methods",m:"5-8"},{t:"Decommissioning / restoration provisions (PV, unwinding)",m:"6"},{t:"Impairment with revaluation surplus interplay",m:"5"},{t:"Investment property classification & disclosure (Ind AS 40)",m:"8"},{t:"Borrowing cost capitalisation (Ind AS 23)",m:"6"}]},{title:"Ind AS 116 – Leases",topics:[{t:"Lessor finance lease – revenue, cost of sales, selling profit",m:"10"},{t:"Lease amortisation schedule",m:"10"},{t:"Lessee – ROU asset & lease liability",m:"5-10"},{t:"Lease modifications",m:"4-8"}]},{title:"Ind AS 109 / 32 – Financial Instruments & EPS",topics:[{t:"Derivatives – forward/put-call, FVTPL marking",m:"10"},{t:"Compound instruments – convertible debentures split",m:"10"},{t:"ECL / classification (amortised cost, FVOCI, FVTPL)",m:"2-5"},{t:"Foreign currency loan – amortised cost + Ind AS 21",m:"8"},{t:"Basic & Diluted EPS with options/warrants",m:"6"},{t:"Repurchase / settlement of compound instruments",m:"10"}]},{title:"Ind AS 101 – First-Time Adoption / Transition",topics:[{t:"Deemed cost election for PPE/land",m:"5"},{t:"Fair value vs amortised cost adjustment on borrowings/loans",m:"5"},{t:"Goodwill exemption on past business combinations",m:"5"},{t:"Subsidiary consolidation on transition (Ind AS 103 exemption)",m:"2"}]},{title:"Theory Bank (Ind AS 1, 8, Conceptual Framework, Ethics)",topics:[{t:"Offsetting – concept & scenarios (Ind AS 1 / 32)",m:"4"},{t:"Qualitative characteristics (enhancing) of useful info",m:"4"},{t:"Prior period error vs change in accounting estimate",m:"4"},{t:"Exceptional/material items – disclosure & examples",m:"4"},{t:"Conceptual Framework – Equity, Income, Expenses definitions",m:"4"},{t:"Blockchain / RPA impact on financial reporting",m:"4-5"},{t:"Code of Ethics – conflicts of interest, integrity, objectivity",m:"2"}]},{title:"Other Recurring Topics",topics:[{t:"Ind AS 19 – Defined benefit obligation & plan assets",m:"8"},{t:"Ind AS 102 – Share-based payments (ESOP vesting)",m:"8"},{t:"Ind AS 34 – Interim reporting / tax expense computation",m:"4"},{t:"Ind AS 105 – Discontinued operations / disposal groups",m:"2-8"},{t:"Ind AS 20 – Government grants",m:"2-5"},{t:"Ind AS 41 – Agriculture (scope questions)",m:"2"},{t:"Ind AS 38 – Intangible assets (software cost capitalisation)",m:"2"},{t:"Ind AS 21 – Foreign currency cash flow statement treatment",m:"4"}]}]},AFM:{name:"Advanced Financial Management",color:"#FF9F6B",groups:[{title:"Portfolio Management & CAPM",topics:[{t:"CAPM – expected return, beta computation",m:"4-6"},{t:"Systematic vs unsystematic risk",m:"4-7"},{t:"Optimal portfolio selection (Sharpe single index model)",m:"8"},{t:"Portfolio standard deviation (correlation cases)",m:"6"},{t:"Sharpe, Treynor, Jensen's Alpha ratios",m:"6-8"},{t:"Coefficient of determination / R-squared for funds",m:"8"}]},{title:"Mutual Funds & NAV",topics:[{t:"NAV computation with entry/exit loads",m:"6-8"},{t:"Dividend reinvestment, bonus units, holding period return",m:"6-10"},{t:"NFO subscription, underwriting commission",m:"6"},{t:"Fund redemption / units redeemed calculation",m:"6"}]},{title:"Foreign Exchange Management",topics:[{t:"Forward contracts – spot, premium/discount calc",m:"4-6"},{t:"Cross rate computation (bid/ask)",m:"4-6"},{t:"Money market hedge vs forward hedge comparison",m:"6-8"},{t:"Exposure netting / receivable & payable hedging",m:"6-8"},{t:"Currency risk parameters (theory)",m:"4"},{t:"Political/country risk identification (theory)",m:"4"}]},{title:"Derivatives – Futures & Options",topics:[{t:"Option strategies – straddle, strangle, covered call payoff",m:"6-10"},{t:"Futures hedging – lot size, margin, MTM",m:"6-8"},{t:"Hedge ratio / number of contracts for complete hedge",m:"7"},{t:"FRA (Forward Rate Agreement) settlement",m:"6-8"},{t:"Interest rate futures / swaps",m:"6"}]},{title:"Security Valuation & Dividend Models",topics:[{t:"Gordon growth / dividend discount model",m:"4-6"},{t:"Walter's model – dividend policy & valuation",m:"4-6"},{t:"P/E multiple approach – overvalued/undervalued shares",m:"4-6"},{t:"EVA (Economic Value Added) computation",m:"6"}]},{title:"Capital Budgeting (International)",topics:[{t:"NPV with foreign currency cash flows",m:"6-10"},{t:"Real options – abandonment, decision trees",m:"6-8"},{t:"Real vs financial options (theory comparison)",m:"4"},{t:"Risk-adjusted discount rate vs certainty equivalent",m:"4-6"}]},{title:"Bonds & Interest Rate Risk",topics:[{t:"Bond duration & immunization",m:"6-8"},{t:"Debenture refinancing / redemption decisions",m:"6-8"},{t:"FRA settlement amount formula application",m:"7"}]},{title:"M&A / Business Valuation",topics:[{t:"EPS maximization / swap ratio in mergers",m:"6-10"},{t:"Free float market capitalization computation",m:"4-6"},{t:"GDR/ADR issue pricing & cost of capital",m:"6-8"}]},{title:"Theory / 4-Mark List Questions",topics:[{t:"Technical analysis – favourable & unfavourable arguments",m:"4"},{t:"Chart patterns (head & shoulders, triangle, wedge, flag)",m:"4"},{t:"Blockchain risks",m:"4"},{t:"Securitization – PTCs, SPV structure",m:"4"},{t:"Start-up India scheme / Business Succession Strategy",m:"4"},{t:"Financial sustainability parameters (NGO/org context)",m:"4"}]}]},AUDIT:{name:"Adv. Auditing, Assurance & Professional Ethics",color:"#7FB1FF",groups:[{title:"Code of Ethics & CA Act Clauses",topics:[{t:"Clause 6, 10, 11 – First Schedule Part I (solicitation, etc.)",m:"2-4"},{t:"NOCLAR – non-compliance with laws & regulations",m:"4"},{t:"Networks of CA firms – registration & approval",m:"4"},{t:"Conflicts of interest – objectivity & integrity scenarios",m:"2-4"},{t:"Professional misconduct case studies (disciplinary)",m:"4-6"}]},{title:"SA 240 – Fraud & Forensic Audit",topics:[{t:"Fraud risk factors – identification in scenarios",m:"4-6"},{t:"Auditor's response to suspected fraud",m:"4-6"},{t:"Forensic accounting – evidence gathering process",m:"4"},{t:"Investigating commission scheme frauds",m:"4-6"},{t:"Frauds via suppliers' ledger / manipulation methods",m:"4"}]},{title:"CARO 2020",topics:[{t:"Clause-wise reporting requirements (key clauses)",m:"4-6"},{t:"Loans/guarantees/investments reporting (subsidiaries, LLP)",m:"4-6"},{t:"Qualification/adverse remarks in CARO reports",m:"4"}]},{title:"Bank & NBFC Audit",topics:[{t:"Advances classification (NPA norms)",m:"4-8"},{t:"RBI prudential norms – NBFC asset classification",m:"4-8"},{t:"Section 9 – non-banking assets restriction",m:"4"},{t:"Central statutory audit – scheduled commercial bank issues",m:"4-6"},{t:"Branch audit – verification of advances (sampling)",m:"4-6"}]},{title:"ESG, BRSR & Integrated Reporting",topics:[{t:"BRSR – applicability & disclosure requirements",m:"4"},{t:"Six capitals of Integrated Reporting",m:"4"},{t:"ESG pillars – Environmental, Social, Governance",m:"4"},{t:"Auditor's role re: climate-related risks",m:"4"}]},{title:"Group Audits & Joint Audits",topics:[{t:"SA 299 – Joint audit, division of work & responsibility",m:"4-6"},{t:"SA 600 – Component auditors / group audit instructions",m:"4-6"},{t:"Consolidated FS audit – subsidiaries/associates coverage",m:"4-6"}]},{title:"Review & Special Engagements",topics:[{t:"SRE 2400 – Review of historical financial statements",m:"4"},{t:"SRE 2410 – Review of interim financial information",m:"4"},{t:"SRS 4400 – Agreed-upon procedures engagement letter",m:"4-6"},{t:"SAE 3400 – Examination of prospective financial info",m:"4"},{t:"Due diligence review – acquisition scenarios",m:"8-10"}]},{title:"Other Standards on Auditing",topics:[{t:"SA 450 – Evaluation of misstatements",m:"4"},{t:"SA 540 – Auditing accounting estimates",m:"4"},{t:"SA 505 – External confirmations reliability",m:"4"},{t:"SA 705/706 – Modified opinions, EOM/OM paragraphs",m:"4-6"},{t:"SA 805 – Audit of single financial statements/elements",m:"4-6"},{t:"SA 530 – Audit sampling",m:"4"}]},{title:"Other Audit Areas",topics:[{t:"Internal audit & internal control evaluation",m:"4-8"},{t:"Peer review / SQC 1 – quality control for firms",m:"4"},{t:"PSU audit – C&AG, propriety audit, performance audit",m:"4-8"},{t:"Technology in audit – RPA, remote audits, data analytics",m:"4"},{t:"Mutual fund / NBFC scheme-wise financial statement audit",m:"4-6"}]}]}};
const SUBJECT_KEYS=Object.keys(DATA),STORAGE_KEY='ca-final-progress-2026-v2',CIRC=2*Math.PI*86,MINI_CIRC=2*Math.PI*28,PANEL_CIRC=2*Math.PI*25;
let state={},activeSubject=SUBJECT_KEYS[0];
function topicKey(s,gi,ti){return s+'-'+gi+'-'+ti}
function loadState(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)state=JSON.parse(r)}catch(e){state={}}}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600)}
function computeSubjectStats(k){const d=DATA[k];let t=0,n=0;d.groups.forEach((g,gi)=>g.topics.forEach((_,ti)=>{t++;if(state[topicKey(k,gi,ti)])n++}));return{total:t,done:n,pct:t?Math.round((n/t)*100):0}}
function computeOverall(){let t=0,n=0;SUBJECT_KEYS.forEach(k=>{const s=computeSubjectStats(k);t+=s.total;n+=s.done});return{total:t,done:n,pct:t?Math.round((n/t)*100):0}}
function setRingFill(el,pct,c){const o=c*(1-pct/100);el.style.strokeDasharray=c+' '+c;el.style.strokeDashoffset=o}
function updateCountdown(){const e=new Date('2026-11-01T00:00:00'),n=new Date(),d=Math.max(0,Math.ceil((e-n)/(864e5)));document.getElementById('countdown').innerHTML='<b>'+d+' days</b> until November 2026 exams begin'}
function renderHero(){const o=computeOverall();setRingFill(document.getElementById('heroRing'),o.pct,CIRC);document.getElementById('heroPct').textContent=o.pct+'%';document.getElementById('heroCount').textContent=o.done+' / '+o.total+' topics'}
function renderRingRow(){const r=document.getElementById('ringRow');r.innerHTML='';SUBJECT_KEYS.forEach(k=>{const d=DATA[k],s=computeSubjectStats(k),c=document.createElement('div');c.className='ring-card'+(k===activeSubject?' active':'');c.style.setProperty('--ring-color',d.color);c.addEventListener('click',()=>{activeSubject=k;render()});const w=document.createElement('div');w.className='mini-ring-wrap';w.innerHTML='<svg viewBox="0 0 64 64"><circle class="mini-ring-track" cx="32" cy="32" r="28"/><circle class="mini-ring-fill" cx="32" cy="32" r="28" stroke="'+d.color+'"/></svg><div class="mini-center">'+s.pct+'%</div>';const t=document.createElement('div');t.className='ring-card-tag';t.style.color=d.color;t.textContent=k;const b=document.createElement('div');b.className='ring-card-sub';b.textContent=s.done+'/'+s.total;c.appendChild(w);c.appendChild(t);c.appendChild(b);r.appendChild(c);requestAnimationFrame(()=>setRingFill(w.querySelector('.mini-ring-fill'),s.pct,MINI_CIRC))})}
function renderPanels(){const c=document.getElementById('panels');c.innerHTML='';SUBJECT_KEYS.forEach(k=>{const d=DATA[k],s=computeSubjectStats(k),p=document.createElement('div');p.className='panel'+(k===activeSubject?' visible':'');p.style.setProperty('--ring-color',d.color);const h=document.createElement('div');h.className='panel-head';const w=document.createElement('div');w.className='panel-ring-wrap';w.innerHTML='<svg viewBox="0 0 56 56"><circle class="panel-ring-track" cx="28" cy="28" r="25"/><circle class="panel-ring-fill" cx="28" cy="28" r="25" stroke="'+d.color+'"/></svg><div class="panel-center">'+s.pct+'%</div>';const t=document.createElement('div');t.innerHTML='<div class="panel-title">'+d.name+'</div><div class="panel-meta">'+s.done+' of '+s.total+' topics covered</div>';h.appendChild(w);h.appendChild(t);p.appendChild(h);requestAnimationFrame(()=>setRingFill(w.querySelector('.panel-ring-fill'),s.pct,PANEL_CIRC));d.groups.forEach((g,gi)=>{const gd=g.topics.filter((_,ti)=>state[topicKey(k,gi,ti)]).length,div=document.createElement('div');div.className='group';const hd=document.createElement('div');hd.className='group-head';hd.innerHTML='<span class="group-title">'+g.title+'</span><span class="group-frac">'+gd+'/'+g.topics.length+'</span>';div.appendChild(hd);g.topics.forEach((tp,ti)=>{const key=topicKey(k,gi,ti),chk=!!state[key],r=document.createElement('div');r.className='topic-row'+(chk?' checked':'');const b=document.createElement('div');b.className='checkbox'+(chk?' checked':'');const tx=document.createElement('div');tx.className='topic-text';tx.textContent=tp.t;const m=document.createElement('div');m.className='topic-marks';m.textContent=tp.m+' mk';r.appendChild(b);r.appendChild(tx);r.appendChild(m);r.addEventListener('click',()=>{state[key]=!state[key];saveState();render()});div.appendChild(r)});p.appendChild(div)});c.appendChild(p)})}
function render(){renderHero();renderRingRow();renderPanels()}
document.getElementById('exportBtn').addEventListener('click',()=>{const o=computeOverall();let r='CA FINAL NOV 2026 - PROGRESS BACKUP\nGenerated: '+new Date().toLocaleString()+'\nOverall: '+o.done+'/'+o.total+' ('+o.pct+'%)\n\n';SUBJECT_KEYS.forEach(k=>{const d=DATA[k],s=computeSubjectStats(k);r+='\n'+d.name+' ('+k+') - '+s.pct+'% ('+s.done+'/'+s.total+')\n';d.groups.forEach((g,gi)=>g.topics.forEach((t,ti)=>r+='  '+(state[topicKey(k,gi,ti)]?'[x]':'[ ]')+' '+t.t+'\n'))});const b=new Blob([r],{type:'text/plain'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='ca-final-progress-'+new Date().toISOString().slice(0,10)+'.txt';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);showToast('Backup downloaded')});
document.getElementById('resetBtn').addEventListener('click',()=>{if(confirm('Reset all ticked topics? This cannot be undone.')){state={};saveState();render();showToast('Progress reset')}});
(function init(){loadState();render();updateCountdown();setInterval(updateCountdown,6e4)})();
</script>
</body>
</html>
